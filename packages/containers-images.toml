[[package]]
id = "docker-nginx"
name = "Docker Nginx"
description = "Official Nginx container image"
category = "Docker"
provider = "script"
install_args = ["bash", "-c", "docker pull nginx:alpine"]
verify_cmd = "docker images nginx --format '{{.Tag}}'"

