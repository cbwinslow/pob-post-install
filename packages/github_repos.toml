[[package]]
id = "lazygit"
name = "lazygit"
description = "Terminal UI for Git"
category = "GitHub"
provider = "github_repo"
install_args = ["https://github.com/jesseduffield/lazygit.git"]
config = { repo_url = "https://github.com/jesseduffield/lazygit.git", clone_dest = "/opt/lazygit", installer = "install.sh" }
verify_cmd = "lazygit --version"

[[package]]
id = "lazydocker"
name = "lazydocker"
description = "Terminal UI for Docker"
category = "GitHub"
provider = "github_repo"
config = { repo_url = "https://github.com/jesseduffield/lazydocker.git", clone_dest = "/opt/lazydocker", installer = "install.sh" }
verify_cmd = "lazydocker --version"

[[package]]
id = "lazynpm"
name = "lazynpm"
description = "Terminal UI for npm"
category = "GitHub"
provider = "github_repo"
config = { repo_url = "https://github.com/jesseduffield/lazynpm.git", clone_dest = "/opt/lazynpm", installer = "install.sh" }
